name: Release Devtools
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Cache pnpm modules
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-
      - uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: |
            - cwd: devtools/chrome-extension
      - name: Use Node.js 22.x
        uses: actions/setup-node@v3.4.1
        with:
          node-version: 22.x
          cache: "pnpm"
      - run: |
          node --version
          yarn -v
          cd devtools/chrome-extension
          yarn run build
          yarn run package
        env:
          # avoid core dump, see: https://github.com/parcel-bundler/parcel/issues/10081
          PARCEL_WORKER_BACKEND: process
      - name: 'Upload Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: formily-devtools
          path: devtools/chrome-extension/build/chrome-mv3-prod.zip
